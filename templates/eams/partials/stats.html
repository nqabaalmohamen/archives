            <h3>إجمالي الأرشيف</h3>
            <div class="value">{{ total_docs }}</div>

        <i class="fas fa-archive" style="font-size: 24px; color: var(--primary-color); opacity: 0.5;"></i>

    <div style="font-size: 12px; color: var(--text-muted);">كافة الوثائق المسجلة</div>
